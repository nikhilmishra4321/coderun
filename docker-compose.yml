
services:
  api-service:
    build: ./api-services
    ports:
      - "8000:8000"
    depends_on: 
      - redis
  
  worker-service:
    build: ./worker-service
    depends_on:
      - redis
      - leaderboard-service


  result-service:
    build: ./result-service
    ports:
      - "8001:8001"
    depends_on:
      - redis
  auth-service:
    build: ./auth-service
    ports:
      - "8002:8002"
    depends_on:
      - postgres

  leaderboard-service:
    build: ./leaderboard-service
    ports:
      - "8003:8003"
    depends_on:
      - postgres

  frontend:
    build: ./frontend
    ports:
      - "3000:80"

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: coderun
      POSTGRES_PASSWORD: coderun123
      POSTGRES_DB: coderun
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
volumes:
  postgres_data: